<html>

    #mouse {
        /* position: absolute; */
        display: flex;
        height: 100%;
        /* align-items: stretch; */

    }

    #input2 {
        display: flex;
        /* flex-grow: 2; */
        /* min-width: 10px !important; */

        position: absolute; */

    #next {
        flex-basis: 0;
        flex-shrink: 1000;

        /* min-width: 10px !important; */
        /* transform: translate(0%, -50%);
        position: absolute; */
        height: auto;

</style>

<body onpointermove="mouse_position(event)">
    <div id="mouse">
        <div id="input2"></div>
        <div id="keyboard"></div>
        <div id="next"></div>
    </div>
</body>

<script>
    // let col = pushCol();
    // console.log(col);
    // col.tabIndex = -1;
    // col.focus();
    let letterHover;

    document.getElementById("next").appendChild(key("..?"));


    function keyhover() {
        event.target.focus();
        if (event.target.parentElement.id === "next") {
            pushCol();
            letterHover.parentElement.remove();
            pushKey(letterHover);
            // document.getElementById("input2").appendChild(document.activeElement.cloneNode(true));
        }
        else if (event.target === document.getElementById("input2").lastChild) {
            event.target.remove();
        }
        else {
            letterHover = event.target;
            // letterHover.id = event.target.parentElement.id;
        }
    }

    function mouse_position(e) {
        //do stuff
        console.log(e);
        var x = e.clientX;
        var y = e.clientY;
        y = y - (document.getElementById("next").getBoundingClientRect().height / 2);
        // document.getElementById("mouse").style.left = x;
        document.getElementById("input2").style.transform = `translate(0, ${y}px)`;
        document.getElementById("next").style.transform = `translate(0, ${y}px)`;
    }

    // function columnenter() {
    //     // while (Number(document.getElementById("keyboard").lastChild.id) > 1 + Number(event.target.id)) popCol();
    //     while (document.getElementById("input2").childElementCount > Number(event.target.id))
    //         document.getElementById("input2").removeChild(document.getElementById("input2").lastChild);
    // }

    // function columnleave() {
    //     // while (Number(document.getElementById("keyboard").lastChild.id) <= Number(event.target.id)) pushCol();
    //     document.getElementById("input2").appendChild(document.activeElement.cloneNode(true));
    // }

    function columndown() {
        event.target.releasePointerCapture(event.pointerId);
        // document.getElementById("input2").style.transform = "translate(-100%)";

    }

    function columnup() {
        // document.getElementById("input2").appendChild(document.activeElement.cloneNode(true));
        // document.getElementById("input2").style.transform = "translate(calc(-100% + 30px))";
        // popCol();
        console.log(event.target);
        document.activeElement.blur()
        letterHover.parentElement.remove();
        pushKey(letterHover);
    }

    function pushCol() {
        let col = column(document.getElementById("keyboard").children.length);
        document.getElementById("keyboard").appendChild(col);
        return col;
    }

    function popCol() {
        document.getElementById("keyboard").removeChild(document.getElementById("keyboard").lastChild);
    }

    function column(id) {
        const column = document.createElement("div");
        column.classList.add("column");
        // column.addEventListener("pointerente", columnleave);
        column.addEventListener("pointerdown", columndown);
        column.addEventListener("pointerup", columnup);
        column.id = id;
        for (i = 97; i <= 122; i++) {
            column.appendChild(key(String.fromCharCode(i)));
        }
        return column;
    }

    function pushKey(key) {
        document.getElementById("input2").appendChild(key);
    }

    function key(innerText) {
        const key = document.createElement("div");
        key.classList.add("key");
        key.addEventListener("pointerover", keyhover);
        key.innerText = innerText;
        key.tabIndex = -1;
        return key;
    }
</script>

</html>
